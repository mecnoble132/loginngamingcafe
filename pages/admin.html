<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Loginn Gaming Cafe</title>
  <link rel="icon" type="image/png" sizes="48x48" href="../loginnfavicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>

<body>

  <!-- ══════════════ LOGIN ══════════════ -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <img src="../images/loginnlogo.png" alt="Loginn">LOGINN<span class="accent-blue">.</span>
      </div>
      <div class="login-title">Admin Login</div>
      <div class="login-form">
        <div class="lf-field">
          <label>Email</label>
          <input type="email" id="loginEmail" class="lf-input" placeholder="Enter your email" autocomplete="email" />
        </div>
        <div class="lf-field">
          <label>Password</label>
          <input type="password" id="loginPass" class="lf-input" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="login-error" id="loginError" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ DASHBOARD ══════════════ -->
  <div id="dashboard" style="display:none">

    <!-- NAV -->
    <nav class="admin-nav">
      <div class="admin-nav-inner">
        <a href="../index.html" class="nav-logo" style="text-decoration:none;">
          <div class="logo-icon"><img src="../images/loginnlogo.png" alt="logo" style="width:100%;height:100%;object-fit:contain;"></div>
          LOGINN<span class="accent-blue">.</span><span class="admin-badge">ADMIN</span>
        </a>
        <div class="admin-nav-right">
          <span class="admin-email" id="adminEmail"></span>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i><span class="hide-mobile">Logout</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="admin-main">
      <div class="admin-container">

        <!-- STATS -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-card-icon blue"><i class="fa-solid fa-gamepad"></i></div>
            <div>
              <div class="stat-card-num" id="statGames">—</div>
              <div class="stat-card-label">Total Games</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon green"><i class="fa-solid fa-newspaper"></i></div>
            <div>
              <div class="stat-card-num" id="statNews">—</div>
              <div class="stat-card-label">News / Events</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon pink"><i class="fa-solid fa-star"></i></div>
            <div>
              <div class="stat-card-num" id="statFeatured">—</div>
              <div class="stat-card-label">Featured</div>
            </div>
          </div>
        </div>

        <!-- TABS -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="games">
            <i class="fa-solid fa-gamepad"></i> Games
          </button>
          <button class="admin-tab" data-tab="news">
            <i class="fa-solid fa-newspaper"></i> News / Events
          </button>
          <button class="admin-tab" data-tab="featured">
            <i class="fa-solid fa-star"></i> Featured
          </button>
        </div>

        <!-- ═══════ GAMES TAB ═══════ -->
        <div class="admin-tab-content active" id="tab-games">
          <div class="admin-panel">
            <div class="panel-header">
              <div class="panel-title"><i class="fa-solid fa-gamepad" style="color:var(--blue)"></i> Games Library</div>
              <div class="panel-actions">
                <button class="btn btn-primary btn-sm" id="addGameBtn">
                  <i class="fa-solid fa-plus"></i> Add Game
                </button>
                <button class="btn btn-ghost btn-sm" id="refreshGamesBtn" title="Fetch from Database">
                  <i class="fa-solid fa-arrows-rotate"></i><span class="hide-mobile">Refresh</span>
                </button>
                <button class="btn btn-outline-pink btn-sm" id="seedGamesBtn" title="Seed Database with Fallbacks">
                  <i class="fa-solid fa-database"></i><span class="hide-mobile">Seed DB</span>
                </button>
              </div>
            </div>
            <div class="panel-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="gameSearch" placeholder="Search games…" />
            </div>
            <div class="admin-cards-list" id="gamesListPanel">
              <div class="table-empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div>
            </div>
          </div>
        </div>

        <!-- ═══════ NEWS TAB ═══════ -->
        <div class="admin-tab-content" id="tab-news">
          <div class="admin-panel">
            <div class="panel-header">
              <div class="panel-title"><i class="fa-solid fa-newspaper" style="color:var(--green)"></i> News & Events</div>
              <div class="panel-actions">
                <button class="btn btn-primary btn-sm" id="addNewsBtn" style="background:var(--green);">
                  <i class="fa-solid fa-plus"></i> Add Event
                </button>
                <button class="btn btn-ghost btn-sm" id="refreshNewsBtn" title="Fetch from Database">
                  <i class="fa-solid fa-arrows-rotate"></i><span class="hide-mobile">Refresh</span>
                </button>
                <button class="btn btn-outline-pink btn-sm" id="seedNewsBtn" title="Seed News with Fallbacks">
                  <i class="fa-solid fa-database"></i><span class="hide-mobile">Seed</span>
                </button>
              </div>
            </div>
            <div class="admin-cards-list" id="newsListPanel">
              <div class="table-empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div>
            </div>
          </div>
        </div>

        <!-- ═══════ FEATURED TAB ═══════ -->
        <div class="admin-tab-content" id="tab-featured">
          <div class="admin-panel">
            <div class="panel-header">
              <div class="panel-title"><i class="fa-solid fa-star" style="color:var(--pink)"></i> Featured Games</div>
              <div class="panel-actions">
                <button class="btn btn-primary btn-sm" id="saveFeaturedBtn" style="background:var(--pink);">
                  <i class="fa-solid fa-floppy-disk"></i> Save Featured
                </button>
              </div>
            </div>
            <div style="padding:16px;" id="featuredPanel">
              <div class="table-empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- ══════════════ GAME MODAL ══════════════ -->
  <div class="modal-overlay" id="gameModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title" id="gameModalTitle"><i class="fa-solid fa-gamepad" style="color:var(--blue)"></i> Add Game</div>
        <button class="modal-close" id="gameModalClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="gameEditId" value="">
        <div class="mf-field">
          <label>Game Title <span class="req">*</span></label>
          <input type="text" id="gameTitle" class="mf-input" placeholder="e.g. Valorant" />
        </div>
        <div class="mf-row">
          <div class="mf-field">
            <label>IGDB Cover ID</label>
            <input type="text" id="gameCoverId" class="mf-input" placeholder="e.g. cobqao" />
          </div>
          <div class="mf-field">
            <label>Genre</label>
            <input type="text" id="gameGenre" class="mf-input" placeholder="e.g. Tactical Shooter" />
          </div>
        </div>
        <div class="mf-row">
          <div class="mf-field">
            <label>Color</label>
            <input type="color" id="gameColor" class="mf-input mf-color" value="#00d4ff" />
          </div>
          <div class="mf-field">
            <label>Tags (comma separated)</label>
            <input type="text" id="gameTags" class="mf-input" placeholder="e.g. Competitive, Team" />
          </div>
        </div>
        <div class="mf-field">
          <label>Platforms</label>
          <div class="mf-checkboxes" id="gamePlatforms">
            <label class="mf-check"><input type="checkbox" value="pc"> PC</label>
            <label class="mf-check"><input type="checkbox" value="ps5"> PS5</label>
            <label class="mf-check"><input type="checkbox" value="xbox"> Xbox</label>
            <label class="mf-check"><input type="checkbox" value="sim"> SIM</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="gameModalCancel">Cancel</button>
        <button class="btn btn-primary btn-sm" id="saveGameBtn"><i class="fa-solid fa-check"></i> Save Game</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ NEWS MODAL ══════════════ -->
  <div class="modal-overlay" id="newsModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title" id="newsModalTitle"><i class="fa-solid fa-newspaper" style="color:var(--green)"></i> Add News / Event</div>
        <button class="modal-close" id="newsModalClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="newsEditId" value="">
        <div class="mf-field">
          <label>Title <span class="req">*</span></label>
          <input type="text" id="newsTitle" class="mf-input" placeholder="e.g. New Games Added!" />
        </div>
        <div class="mf-row">
          <div class="mf-field">
            <label>Date</label>
            <input type="text" id="newsDate" class="mf-input" placeholder="e.g. April 2, 2026" />
          </div>
          <div class="mf-field">
            <label>Tag Label</label>
            <input type="text" id="newsTag" class="mf-input" placeholder="e.g. ANNOUNCEMENT" />
          </div>
        </div>
        <div class="mf-field">
          <label>Tag Color</label>
          <div class="mf-checkboxes" id="newsTagColorGroup">
            <label class="mf-check"><input type="radio" name="tagColor" value="tag-blue" checked> Blue</label>
            <label class="mf-check"><input type="radio" name="tagColor" value="tag-green"> Green</label>
            <label class="mf-check"><input type="radio" name="tagColor" value="tag-pink"> Pink</label>
          </div>
        </div>
        <div class="mf-field">
          <label>Description</label>
          <textarea id="newsDesc" class="mf-input mf-textarea" placeholder="Write about this news/event…"></textarea>
        </div>
        <div class="mf-row">
          <div class="mf-field">
            <label>CTA Button Text</label>
            <input type="text" id="newsCtaText" class="mf-input" placeholder="e.g. Learn More" />
          </div>
          <div class="mf-field">
            <label>CTA Link</label>
            <input type="text" id="newsCtaLink" class="mf-input" placeholder="e.g. membership.html" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="newsModalCancel">Cancel</button>
        <button class="btn btn-primary btn-sm" id="saveNewsBtn" style="background:var(--green);border-color:var(--green);"><i class="fa-solid fa-check"></i> Save</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="../js/admin.js"></script>
</body>

</html>
